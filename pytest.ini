[pytest]
# Pytest configuration for Yodle test suite

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers - used to categorize tests
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    gui: marks tests that require display server
    unit: marks tests as unit tests (fast, isolated)

# Output options
addopts =
    -v
    -ra
    --strict-markers
    --tb=short
    --color=yes

# Coverage options (if pytest-cov is installed)
# Uncomment to enable coverage reporting
# addopts =
#     --cov=yodle
#     --cov-report=term-missing
#     --cov-report=html
#     --cov-branch

# Minimum coverage threshold (optional)
# Uncomment to enforce coverage requirements
# [coverage:run]
# source = .
# omit =
#     tests/*
#     .venv/*
#     setup.py
#
# [coverage:report]
# fail_under = 80
# precision = 2
# show_missing = True

# Asyncio configuration
asyncio_mode = auto

# Timeout for tests (requires pytest-timeout)
# timeout = 300

# Logging
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Warnings
filterwarnings =
    error
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
